<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ For You ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8486a;
            --rose-light: #f7a8bc;
            --rose-pale: #fce4ec;
            --gold: #e8c97a;
            --gold-light: #f5e5b0;
            --cream: #fff9f5;
            --dark: #1a0a10;
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.18);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: #fff;
            cursor: none;
        }

        /* ── Custom cursor ── */
        #cursor {
            position: fixed;
            width: 18px; height: 18px;
            background: var(--rose);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%);
            mix-blend-mode: screen;
            transition: width .15s, height .15s, opacity .2s;
            box-shadow: 0 0 14px var(--rose), 0 0 30px rgba(232,72,106,.4);
        }
        #cursor.big { width: 36px; height: 36px; opacity: .6; }

        /* ── Gradient canvas background ── */
        #bgCanvas {
            position: fixed; inset: 0;
            z-index: 0;
        }

        /* ── Petal layer ── */
        .petal-layer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            bottom: -60px;
            font-size: 22px;
            animation: petalRise var(--dur) ease-in infinite var(--delay);
            opacity: 0;
            filter: drop-shadow(0 0 6px rgba(232,72,106,.5));
        }

        @keyframes petalRise {
            0%   { transform: translateY(0) rotate(0deg) scale(.6); opacity: 0; }
            8%   { opacity: .85; }
            88%  { opacity: .7; }
            100% { transform: translateY(-110vh) rotate(var(--spin)) scale(1.1); opacity: 0; }
        }

        /* ── Stage wrapper ── */
        #stage {
            position: fixed; inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            width: 100%;
            max-width: 640px;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 52px 52px 44px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255,255,255,.04),
                0 32px 80px rgba(0,0,0,.55),
                0 0 80px rgba(232,72,106,.12);
            animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(.96); }
            to   { opacity: 1; transform: none; }
        }

        /* shine edge */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Typography ── */
        .display {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -.02em;
            color: #fff;
            text-shadow: 0 0 40px rgba(232,72,106,.5);
            margin-bottom: 14px;
        }

        .display em {
            font-style: italic;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(232,201,122,.6);
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: rgba(255,255,255,.7);
            margin-bottom: 36px;
            letter-spacing: .01em;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 44px;
            background: linear-gradient(135deg, #e8486a, #c4254a);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: .04em;
            border: none;
            border-radius: 100px;
            cursor: none;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 8px 32px rgba(232,72,106,.45), 0 2px 8px rgba(0,0,0,.3);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 48px rgba(232,72,106,.6), 0 4px 12px rgba(0,0,0,.3);
        }
        .btn-primary:active { transform: scale(.97); }

        /* ── Pill chip ── */
        .chip {
            display: inline-block;
            background: rgba(232,201,122,.15);
            border: 1px solid rgba(232,201,122,.3);
            color: var(--gold-light);
            font-size: .78rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 100px;
            margin-bottom: 22px;
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Counter badge ── */
        .counter-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
        }
        .counter-badge {
            background: rgba(232,72,106,.18);
            border: 1px solid rgba(232,72,106,.35);
            border-radius: 100px;
            padding: 6px 20px;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--rose-light);
            min-width: 64px;
            text-align: center;
            font-family: 'Playfair Display', serif;
            transition: all .2s;
        }
        .counter-label {
            font-size: .85rem;
            color: rgba(255,255,255,.55);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .progress-bar-wrap {
            margin-top: 18px;
            background: rgba(255,255,255,.08);
            border-radius: 100px;
            height: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rose), var(--gold));
            border-radius: 100px;
            transition: width .4s cubic-bezier(.16,1,.3,1);
            box-shadow: 0 0 12px var(--rose);
        }

        .hint {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: rgba(255,255,255,.45);
            margin-top: 10px;
        }

        /* ── Score board ── */
        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 24px 0 8px;
            padding: 18px 28px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 18px;
        }
        .score-val {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(232,201,122,.5);
            line-height: 1;
        }
        .score-sep { color: rgba(255,255,255,.25); font-size: 1.5rem; }
        .score-total { font-size: 1.4rem; color: rgba(255,255,255,.35); }
        .score-label { font-size: .82rem; color: rgba(255,255,255,.4); letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

        /* ── Final letter ── */
        .letter-wrap {
            text-align: left;
            background: rgba(0,0,0,.25);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 18px;
            padding: 32px 34px;
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--rose) transparent;
            border-left: 3px solid var(--rose);
        }
        .letter-wrap::-webkit-scrollbar { width: 5px; }
        .letter-wrap::-webkit-scrollbar-thumb { background: var(--rose); border-radius: 10px; }

        .letter-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.12rem;
            line-height: 2;
            color: rgba(255,255,255,.9);
            white-space: pre-line;
        }

        .cursor-blink {
            display: inline-block;
            width: 2px; height: 1.1em;
            background: var(--rose);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── Falling hearts ── */
        .fheart {
            position: fixed;
            font-size: 32px;
            cursor: none;
            z-index: 20;
            user-select: none;
            filter: drop-shadow(0 0 12px rgba(232,72,106,.7));
            animation: hbeat .9s ease-in-out infinite alternate;
            transition: transform .1s;
        }
        .fheart:hover { transform: scale(1.35) rotate(10deg); }
        @keyframes hbeat {
            from { transform: scale(1); }
            to   { transform: scale(1.12); }
        }

        /* ── Pop messages ── */
        .pop-msg {
            position: fixed;
            background: linear-gradient(135deg, rgba(232,72,106,.85), rgba(196,37,74,.85));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.2);
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.05rem;
            padding: 9px 22px;
            border-radius: 100px;
            pointer-events: none;
            z-index: 30;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(232,72,106,.35);
            animation: popUp 2.2s ease-out forwards;
        }
        @keyframes popUp {
            0%   { opacity: 0; transform: translateY(0) scale(.7); }
            15%  { opacity: 1; transform: translateY(-24px) scale(1); }
            75%  { opacity: 1; transform: translateY(-44px) scale(1); }
            100% { opacity: 0; transform: translateY(-70px) scale(.85); }
        }

        /* ── Sparkle floats ── */
        .spark {
            position: fixed;
            pointer-events: none;
            z-index: 25;
            animation: sparkOut 1.4s ease-out forwards;
            font-size: 16px;
        }
        @keyframes sparkOut {
            0%   { opacity: 1; transform: scale(0) rotate(0deg); }
            50%  { opacity: .9; transform: scale(1.4) rotate(160deg); }
            100% { opacity: 0; transform: scale(0) rotate(360deg); }
        }

        /* ── Name highlight ── */
        .name-hl {
            color: var(--gold);
            font-style: italic;
        }

        /* ── Music btn ── */
        #musicBtn {
            position: fixed;
            bottom: 24px; right: 24px;
            width: 46px; height: 46px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: none;
            z-index: 100;
            backdrop-filter: blur(12px);
            transition: background .2s, transform .2s;
            box-shadow: 0 0 20px rgba(232,72,106,.3);
        }
        #musicBtn:hover {
            background: rgba(232,72,106,.3);
            transform: scale(1.1);
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .card { padding: 36px 26px 32px; }
            .display { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<div class="petal-layer" id="petalLayer"></div>
<div id="stage"></div>

<div id="musicBtn" onclick="toggleMusic()">🔇</div>
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_f7cf159b3d.mp3?filename=soft-piano-100-bpm-121529.mp3" type="audio/mp3">
</audio>

<script>
/* ── CONFIG ── */
const HER_NAME = "Duua";

/* ── State ── */
let stage = 0, tapCount = 0, score = 0;
let gameInterval, musicOn = false;

const messages = [
    "Having you as a friend is a blessing 🌟",
    "You make every hangout unforgettable ✨",
    "Best friend energy, always 💫",
    "You give the best advice, no cap 🌸",
    "Lucky to call you my friend 🍀",
    "You're the funniest person I know 😂",
    "Real ones like you are rare 💎",
    "Friendship goals? That's literally us 🎉",
    "You always show up when it matters 🫂",
    "Grateful to have you in my corner 🌻",
    "You make boring days actually fun ✨",
    "The most genuine person I've met 💯",
    "Your energy is seriously contagious 🌟",
    "You just get it, every single time 🙌",
    "Best decision: becoming your friend 🎊",
    "You're hilarious and you don't even try 😄",
    "Solid, reliable, and truly one of a kind 💎",
    "Every memory with you is a good one 📸",
    "You bring out the best in everyone 🌺",
    "This friendship is the real treasure 🏆"
];

/* ── Cursor ── */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cur.classList.add('big'));
document.addEventListener('mouseup',   () => cur.classList.remove('big'));

/* ── Animated canvas background ── */
(function initCanvas() {
    const cv = document.getElementById('bgCanvas');
    const ctx = cv.getContext('2d');
    let w, h, t = 0;

    function resize() {
        w = cv.width  = window.innerWidth;
        h = cv.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const orbs = [
        { x: .25, y: .35, r: .45, c: '#c4254a' },
        { x: .75, y: .65, r: .4,  c: '#7a1233' },
        { x: .55, y: .2,  r: .35, c: '#3d0a1a' },
        { x: .15, y: .75, r: .38, c: '#9e1f3f' },
    ];

    function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#0e0409';
        ctx.fillRect(0, 0, w, h);

        orbs.forEach((o, i) => {
            const ox = (o.x + Math.sin(t * .0004 + i) * .1) * w;
            const oy = (o.y + Math.cos(t * .0003 + i * 1.3) * .1) * h;
            const gr = ctx.createRadialGradient(ox, oy, 0, ox, oy, o.r * Math.min(w, h));
            gr.addColorStop(0, o.c + 'cc');
            gr.addColorStop(1, 'transparent');
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = gr;
            ctx.fillRect(0, 0, w, h);
        });

        ctx.globalCompositeOperation = 'source-over';
        t++;
        requestAnimationFrame(draw);
    }
    draw();
})();

/* ── Petals ── */
function spawnPetals() {
    const layer = document.getElementById('petalLayer');
    const emojis = ['🌟','✨','🎉','🎊','🍀','💫','🌈','⭐'];
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = emojis[i % emojis.length];
        p.style.cssText = `
            left: ${Math.random()*100}%;
            font-size: ${Math.random()*16+12}px;
            --dur: ${Math.random()*8+7}s;
            --delay: -${Math.random()*14}s;
            --spin: ${(Math.random()-.5)*720}deg;
        `;
        layer.appendChild(p);
    }
}
spawnPetals();

/* ── Sparkles ── */
function spark(x, y, n = 7) {
    for (let i = 0; i < n; i++) {
        setTimeout(() => {
            const s = document.createElement('div');
            s.className = 'spark';
            s.textContent = ['✨','💫','⭐','🌟','💥'][Math.floor(Math.random()*5)];
            s.style.left = (x + (Math.random()-.5)*90) + 'px';
            s.style.top  = (y + (Math.random()-.5)*90) + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1400);
        }, i * 55);
    }
}

/* ── Pop message ── */
function popMsg(x, y) {
    const m = document.createElement('div');
    m.className = 'pop-msg';
    m.textContent = messages[Math.floor(Math.random()*messages.length)];
    m.style.left = Math.max(8, Math.min(x - 80, window.innerWidth - 240)) + 'px';
    m.style.top  = (y - 20) + 'px';
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 2200);
}

/* ── Transition ── */
function go(html) {
    const s = document.getElementById('stage');
    s.style.transition = 'opacity .4s, transform .4s';
    s.style.opacity = '0';
    s.style.transform = 'scale(.96)';
    setTimeout(() => {
        s.innerHTML = `<div class="card">${html}</div>`;
        s.style.opacity = '1';
        s.style.transform = 'scale(1)';
        spark(window.innerWidth/2, window.innerHeight/2, 14);
    }, 420);
}

/* ── Music ── */
function toggleMusic() {
    const a = document.getElementById('bgMusic');
    const b = document.getElementById('musicBtn');
    if (musicOn) { a.pause(); b.textContent = '🔇'; }
    else { a.play().catch(()=>{}); b.textContent = '🔊'; }
    musicOn = !musicOn;
}

/* ── SCREENS ── */
function screenStart() {
    go(`
        <div class="chip">A friend made this for you</div>
        <h1 class="display">Something <em>special</em><br>is waiting for you</h1>
        <p class="subtitle">A little surprise from your friend, just for you</p>
        <button class="btn-primary" onclick="screenTap()">
            Begin ✦
        </button>
        <p class="hint" style="margin-top:22px;">Made with friendship 🤝</p>
    `);
}

function screenTap() {
    const audio = document.getElementById('bgMusic');
    audio.play().then(() => { musicOn = true; document.getElementById('musicBtn').textContent = '🔊'; }).catch(()=>{});
    stage = 1; tapCount = 0;
    go(`
        <div class="chip">Tap anywhere</div>
        <h1 class="display">Hey, <em>${HER_NAME}</em> 👋</h1>
        <p class="subtitle">Your friend made this for you. Every tap unlocks a friendship message.</p>
        <div class="counter-wrap">
            <div class="counter-badge" id="tapBadge">0</div>
            <div class="counter-label">friend messages</div>
        </div>
        <div class="progress-bar-wrap" style="margin-top:18px;">
            <div class="progress-bar-fill" id="progFill" style="width:0%"></div>
        </div>
        <p class="hint">10 taps = a surprise 🎁</p>
    `);
}

function screenGame() {
    stage = 2; score = 0;
    go(`
        <div class="chip">Mini game</div>
        <h1 class="display">Catch the<br><em>Stars</em> ⭐</h1>
        <p class="subtitle">Click every star before it escapes</p>
        <div class="scoreboard">
            <div>
                <div style="display:flex;align-items:baseline;gap:6px">
                    <span class="score-val" id="scoreVal">0</span>
                    <span class="score-sep">/</span>
                    <span class="score-total">10</span>
                </div>
                <div class="score-label">Stars caught</div>
            </div>
        </div>
        <p class="hint">✦ They fall fast — be quicker ✦</p>
    `);

    gameInterval = setInterval(() => {
        if (stage !== 2) { clearInterval(gameInterval); return; }
        spawnFallingHeart();
    }, 650);
}

function spawnFallingHeart() {
    const h = document.createElement('div');
    h.className = 'fheart';
    h.textContent = ['⭐','🌟','💫','✨','🎊'][Math.floor(Math.random()*5)];
    h.style.left = Math.random()*82+8 + '%';
    h.style.top  = '-52px';
    document.body.appendChild(h);

    let y = -52;
    const spd = Math.random()*2.5 + 2;
    const tid = setInterval(() => {
        y += spd;
        h.style.top = y + 'px';
        if (y > window.innerHeight + 60) { h.remove(); clearInterval(tid); }
    }, 16);

    h.addEventListener('click', (e) => {
        e.stopPropagation();
        score++;
        const sv = document.getElementById('scoreVal');
        if (sv) sv.textContent = score;
        spark(e.clientX, e.clientY, 6);
        h.remove(); clearInterval(tid);
        if (score >= 10) screenFinal();
    });
}

function screenFinal() {
    stage = 3;
    document.querySelectorAll('.fheart').forEach(h => h.remove());
    clearInterval(gameInterval);

    go(`
        <div class="chip">A message from your friend</div>
        <h1 class="display" style="font-size:2rem;margin-bottom:20px;">You caught them all ✦</h1>
        <div class="letter-wrap">
            <div class="letter-text" id="letterText"></div>
        </div>
    `);

    for (let i = 0; i < 18; i++) {
        setTimeout(() => spark(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 4), i*200);
    }

    const letter = `Hey Duua,

You caught all the stars — just like you always do. 🌟

I just wanted to take a second to say
something I don't say enough...

Thank you for being such an amazing friend.

The kind of friend who actually listens.
The kind who shows up without being asked.
The kind who makes even the worst days
somehow way more bearable.

People like you are rare, Duua.
Like genuinely, truly rare.

I'm so glad our paths crossed.
Every memory we've made together is one
I wouldn't trade for anything.

Keep being exactly who you are —
funny, real, kind, and completely yourself.
The world needs more people like you.

Here's to more laughs, more memories,
and a friendship that lasts forever. 🎉

Your friend always,
Bilal 🤝

P.S. — You're stuck with me. No refunds. 😄`;

    setTimeout(() => {
        const el = document.getElementById('letterText');
        if (!el) return;
        let i = 0;
        function type() {
            if (!document.getElementById('letterText')) return;
            if (i <= letter.length) {
                el.innerHTML = letter.slice(0, i).replace(/\n/g, '<br>') + '<span class="cursor-blink"></span>';
                i++;
                setTimeout(type, 38);
            }
        }
        type();
    }, 600);
}

/* ── Click handler ── */
document.addEventListener('click', (e) => {
    if (e.target.closest('.btn-primary') || e.target.closest('#musicBtn') || e.target.classList.contains('fheart')) return;

    if (stage === 1) {
        tapCount++;
        const badge = document.getElementById('tapBadge');
        const fill  = document.getElementById('progFill');
        if (badge) badge.textContent = tapCount;
        if (fill)  fill.style.width  = Math.min(tapCount*10, 100) + '%';
        popMsg(e.clientX, e.clientY);
        spark(e.clientX, e.clientY, 3);
        if (tapCount >= 10) { setTimeout(screenGame, 900); stage = 0; }
    }
});

/* ── Init ── */
screenStart();
</script>
</body>
